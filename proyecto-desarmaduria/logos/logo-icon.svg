<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4a261"/>
      <stop offset="50%" style="stop-color:#e9c46a"/>
      <stop offset="100%" style="stop-color:#f4a261"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e76f51"/>
      <stop offset="100%" style="stop-color:#f4a261"/>
    </linearGradient>
  </defs>
  
  <!-- Fondo -->
  <rect width="100" height="100" rx="15" fill="url(#bgGrad)"/>
  
  <!-- Borde -->
  <rect width="100" height="100" rx="15" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
  
  <!-- Engranaje pequeño -->
  <g transform="translate(50,30)" opacity="0.3">
    <circle cx="0" cy="0" r="15" fill="url(#goldGrad)"/>
    <circle cx="0" cy="0" r="10" fill="url(#bgGrad)"/>
    <rect x="-2" y="-20" width="4" height="8" fill="url(#goldGrad)"/>
    <rect x="-2" y="-20" width="4" height="8" fill="url(#goldGrad)" transform="rotate(60)"/>
    <rect x="-2" y="-20" width="4" height="8" fill="url(#goldGrad)" transform="rotate(120)"/>
    <rect x="-2" y="-20" width="4" height="8" fill="url(#goldGrad)" transform="rotate(180)"/>
    <rect x="-2" y="-20" width="4" height="8" fill="url(#goldGrad)" transform="rotate(240)"/>
    <rect x="-2" y="-20" width="4" height="8" fill="url(#goldGrad)" transform="rotate(300)"/>
  </g>
  
  <!-- Texto FGF -->
  <text x="50" y="62" font-family="'Arial Black', sans-serif" font-size="32" font-weight="900" text-anchor="middle" fill="url(#goldGrad)">FGF</text>
  
  <!-- Línea -->
  <line x1="15" y1="68" x2="85" y2="68" stroke="url(#goldGrad)" stroke-width="1" opacity="0.5"/>
  
  <!-- Texto DESARMADURÍA -->
  <text x="50" y="80" font-family="'Arial', sans-serif" font-size="8" font-weight="700" text-anchor="middle" letter-spacing="2" fill="url(#goldGrad)">DESARMADURÍA</text>
</svg>